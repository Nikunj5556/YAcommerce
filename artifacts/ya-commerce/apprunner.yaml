version: 1.0
runtime: nodejs18

build:
  commands:
    pre-build:
      - echo "Installing dependencies..."
      - npm install
    build:
      - echo "Building application..."
      - npm run build
    post-build:
      - echo "Build completed successfully"

run:
  runtime-version: 18
  command: npm run serve
  network:
    port: 3000
    env: PORT
  env:
    - name: NODE_ENV
      value: production
