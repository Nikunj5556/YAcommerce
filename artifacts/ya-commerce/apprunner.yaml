# app-runner.yaml Configuration for pnpm

# Install pnpm
install:
  runtime-versions:
    nodejs: 16 # Specify your Node.js version

  # Install pnpm globally
  commands:
    - npm install -g pnpm

# Build command
build:
  commands:
    - pnpm install
    - pnpm run build # Change this to your project's build script
    -npm run build

# Set other configurations as needed
